# ==============================================================================
# nginx.conf — Production configuration for Dumper
#
# Usage:
#   nginx -c /opt/dumper/nginx.conf
#   OR copy to /etc/nginx/sites-available/dumper and symlink to sites-enabled/
#
# Assumptions:
#   - Dumper runs on 127.0.0.1:5000 (uvicorn, single worker)
#   - TLS certificates managed by Let's Encrypt / Certbot
#   - Replace YOUR_DOMAIN with your actual domain name
# ==============================================================================

# Shared rate-limit zones (defined in http context; if using sites-available,
# move these into your main nginx.conf http block).
limit_req_zone  $binary_remote_addr  zone=login_zone:10m   rate=5r/m;
limit_req_zone  $binary_remote_addr  zone=global_zone:20m  rate=60r/m;
limit_conn_zone $binary_remote_addr  zone=conn_zone:10m;

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── TLS ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Modern TLS only (TLS 1.2 + 1.3)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Session resumption
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    # Content-Security-Policy: tighten as needed after testing
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none';"
        always;

    # ── Connection limits ──────────────────────────────────────────────────
    limit_conn conn_zone 20;            # max 20 simultaneous connections per IP

    # ── Global rate limit ──────────────────────────────────────────────────
    limit_req zone=global_zone burst=20 nodelay;
    limit_req_status 429;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/dumper_access.log combined;
    error_log  /var/log/nginx/dumper_error.log  warn;

    # ── Timeouts & buffer sizes ────────────────────────────────────────────
    client_max_body_size    2m;         # no file uploads in Dumper
    client_body_timeout     15s;
    client_header_timeout   15s;
    keepalive_timeout       65s;
    send_timeout            15s;

    # ── Hide server version ────────────────────────────────────────────────
    server_tokens off;

    # ── Static files (served by nginx directly for performance) ───────────
    location /static/ {
        alias /opt/dumper/static/;

        # Aggressive caching for versioned assets
        expires     30d;
        add_header  Cache-Control "public, immutable";

        # Only allow GET / HEAD for static content
        limit_except GET HEAD { deny all; }
    }

    # ── Login endpoint — strict rate limit (fail2ban at nginx level) ───────
    # The app also has its own in-process brute-force protection (5 req / 5 min).
    # nginx adds a second layer: 5 requests/minute with a tiny burst.
    location = /login {
        limit_req zone=login_zone burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Setup endpoint — also rate-limited (one-time use, extra caution) ──
    location = /setup {
        limit_req zone=login_zone burst=2 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── All other app requests ─────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";     # disable keep-alive to upstream

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer responses to free upstream workers quickly
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Block common attack paths ──────────────────────────────────────────
    location ~* \.(env|git|sh|py|cfg|ini|bak|sql|db)$ {
        deny all;
        return 404;
    }
    location ~ /\.  {
        deny all;          # block hidden files / .git traversal
        return 404;
    }
}
