# ==============================================================================
# Dumper — Configuration File
# ==============================================================================

app:
  name: "Dumper"
  host: "0.0.0.0"
  port: 5000
  debug: false
  secret_key: "CHANGE_ME_to_a_long_random_string_32chars+"
  # Timezone for scheduler (e.g. "Europe/Moscow", "UTC")
  timezone: "UTC"

# ------------------------------------------------------------------------------
# Database
# ------------------------------------------------------------------------------
database:
  path: "data/dumper.db"

# ------------------------------------------------------------------------------
# Encryption
# Master key for AES-256-GCM device credential encryption.
# IMPORTANT: Keep this secret and back it up. Losing it means losing all creds.
# Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
# ------------------------------------------------------------------------------
encryption:
  master_key: "iiEv0AeL8agKGVU9fZVvob2o25unxgnNuCX5baUQdC0="

# ------------------------------------------------------------------------------
# Git repository for config storage
# ------------------------------------------------------------------------------
git:
  repo_path: "configs_repo"
  author_name: "Dumper Bot"
  author_email: "dumper@localhost"

# ------------------------------------------------------------------------------
# Scheduler defaults
# ------------------------------------------------------------------------------
scheduler:
  # Default cron for all devices (daily at 03:00 AM)
  default_cron: "0 3 * * *"
  # Max concurrent backup workers
  max_workers: 20
  # ICMP ping interval in seconds
  ping_interval: 60
  # Max concurrent ping workers
  ping_workers: 50

# ------------------------------------------------------------------------------
# Notifications (Rocket.Chat / Mattermost compatible webhooks)
# ------------------------------------------------------------------------------
notifications:
  enabled: false
  # List of webhook URLs to notify
  webhooks: []
  #  - "https://your.rocketchat.server/hooks/TOKEN"
  #  - "https://your.mattermost.server/hooks/TOKEN"
  # Notify on backup failure
  on_backup_fail: true
  # Notify on ping failure (device unreachable)
  on_ping_fail: true

# ------------------------------------------------------------------------------
# LDAP Authentication (optional)
# ------------------------------------------------------------------------------
ldap:
  enabled: false
  server: "ldap://dc.example.com"
  port: 389
  use_ssl: false
  base_dn: "dc=example,dc=com"
  user_search_filter: "(sAMAccountName={username})"
  bind_dn: ""
  bind_password: ""
