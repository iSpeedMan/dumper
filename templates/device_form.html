{% extends "base.html" %}

{% block header_actions %}
  <a href="/inventory/" class="metro-btn secondary">{{ t('dev.back') }}</a>
{% endblock %}

{% block content %}
<div class="panel panel-form">
  <div class="panel-header">
    <span class="panel-title">{{ t(page_title) }}</span>
  </div>
  <div class="panel-body">
    <form method="post"
          action="/inventory/{{ device.id ~ '/edit' if device else 'add' }}"
          class="metro-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}"/>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ t('dev.name') }} *</label>
          <input class="metro-input" type="text" name="name" required
                 value="{{ device.name if device else '' }}" placeholder="core-sw-01"/>
        </div>
        <div class="form-group">
          <label class="form-label">{{ t('dev.host') }} *</label>
          <input class="metro-input" type="text" name="hostname" required
                 value="{{ device.hostname if device else '' }}" placeholder="192.168.1.1"/>
        </div>
      </div>

      <div class="form-row trio">
        <div class="form-group">
          <label class="form-label">{{ t('dev.port') }}</label>
          <input class="metro-input" type="number" name="port"
                 value="{{ device.port if device else 22 }}" min="1" max="65535"/>
        </div>
        <div class="form-group">
          <label class="form-label">{{ t('dev.protocol') }}</label>
          <select class="metro-select" name="connection_type">
            <option value="ssh"    {% if not device or device.connection_type == 'ssh' %}selected{% endif %}>SSH</option>
            <option value="telnet" {% if device and device.connection_type == 'telnet' %}selected{% endif %}>Telnet</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">{{ t('dev.netmiko_type') }} *</label>
          <select class="metro-select" name="netmiko_device_type">
            {% for nt in netmiko_types %}
            <option value="{{ nt }}" {% if device and device.netmiko_device_type == nt %}selected{% endif %}>{{ nt }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-divider">{{ t('dev.credentials') }}</div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ t('dev.username') }} *</label>
          <input class="metro-input" type="text" name="username" required
                 value="{{ device.username if device else '' }}" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label class="form-label">
            {{ t('dev.password') }}
            {% if device %}<span class="text-dim small"> {{ t('dev.password_hint') }}</span>{% else %}*{% endif %}
          </label>
          <input class="metro-input" type="password" name="password"
                 {% if not device %}required{% endif %} autocomplete="new-password"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">{{ t('dev.enable_secret') }}</label>
        <input class="metro-input" type="password" name="enable_secret" autocomplete="new-password"/>
      </div>

      <div class="form-divider">{{ t('dev.backup_config') }}</div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ t('dev.group') }}</label>
          <select class="metro-select" name="group_id">
            <option value="">{{ t('dev.no_group') }}</option>
            {% for g in groups %}
            <option value="{{ g.id }}" {% if device and device.group_id == g.id %}selected{% endif %}>{{ g.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">{{ t('dev.template') }}</label>
          <select class="metro-select" name="template_id">
            <option value="">{{ t('dev.no_template') }}</option>
            {% for tmpl in templates %}
            <option value="{{ tmpl.id }}" {% if device and device.template_id == tmpl.id %}selected{% endif %}>{{ tmpl.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">{{ t('dev.custom_cron') }}</label>
        <input class="metro-input" type="text" name="custom_cron"
               value="{{ device.custom_cron if device else '' }}" placeholder="0 3 * * *"/>
        <span class="form-hint">{{ t('dev.cron_hint') }}</span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ t('dev.retention_days') }}</label>
          <input class="metro-input" type="number" name="retention_days" min="1"
                 value="{{ device.retention_days if device else '' }}"
                 placeholder="{{ t('dev.retention_hint') }}"/>
          <span class="form-hint">{{ t('dev.retention_hint') }}</span>
        </div>
        <div class="form-group form-group--end">
          <label class="metro-checkbox">
            <input type="hidden" name="backup_enabled" value="false"/>
            <input type="checkbox" name="backup_enabled" value="true"
              {% if not device or device.backup_enabled %}checked{% endif %}/>
            <span class="checkbox-custom"></span>
            {{ t('dev.backup_enabled') }}
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">{{ t('dev.description') }}</label>
        <textarea class="metro-textarea metro-textarea--xs" name="description" rows="2">{{ device.description if device else '' }}</textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="metro-btn primary">{{ t('dev.save') }}</button>
        <a href="/inventory/" class="metro-btn secondary">{{ t('dev.cancel') }}</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
