<!DOCTYPE html>
<html lang="{{ lang or 'ru' }}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ t('auth.login_title') }} — dumper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <script>
    (function(){
      var m = document.cookie.match(/theme=([^;]+)/);
      if (m && m[1] === 'light') document.documentElement.style.background = '#eef2ff';
    })();
  </script>
</head>
<body class="{{ 'theme-light' if request.cookies.get('theme') == 'light' else '' }}">

<!-- Ambient background orbs -->
<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="auth-screen">
  <div class="auth-box">
    <div class="auth-brand">📦 <strong>dump</strong>er</div>
    <h1 class="auth-title">{{ t('auth.login_title') }}</h1>
    <p class="auth-subtitle">network configuration backup</p>

    {% if error %}
    <div class="metro-error">{{ t(error) }}</div>
    {% endif %}

    <form method="post" action="/login" class="metro-form">
      <input type="hidden" name="next" value="{{ request.query_params.get('next', '/') }}"/>
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}"/>
      <div class="form-group">
        <label class="form-label">{{ t('auth.username') }}</label>
        <input class="metro-input" type="text" name="username" autofocus autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label class="form-label">{{ t('auth.password') }}</label>
        <input class="metro-input" type="password" name="password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="metro-btn primary w-full">{{ t('auth.sign_in') }}</button>
    </form>

    <div class="login-actions">
      <button class="ctrl-btn {% if lang == 'ru' %}active{% endif %}" onclick="switchLang('ru')">ru</button>
      <button class="ctrl-btn {% if lang == 'en' %}active{% endif %}" onclick="switchLang('en')">en</button>
      <button class="ctrl-btn" onclick="toggleTheme()">{{ '☾' if request.cookies.get('theme') != 'light' else '☼' }}</button>
    </div>
  </div>
</div>
<script src="/static/js/main.js"></script>
</body>
</html>
